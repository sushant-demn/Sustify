<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --primary: #b79fff;
            --primary-dim: #a88cfb;
            --primary-container: #ab8ffe;
            --on-primary-container: #290070;
            --surface-dim: #060e20;
            --surface-variant: #192540;
            --on-surface: #dee5ff;
            --on-surface-variant: #a3aac4;
            --background: #000000;
            --obsidian: #0a0a0f;
            --font-main: 'Manrope', sans-serif;
            --radius-md: 1rem;
            --radius-lg: 2rem;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--background);
            font-family: var(--font-main);
            color: var(--on-surface);
        }

        .player-widget {
            position: relative;
            width: 530px;
            height: 260px;
            background-color: var(--surface-dim);
            border-radius: var(--radius-md);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 32px 64px rgba(183, 159, 255, 0.08);
        }

        .main-content {
            display: flex;
            flex: 1;
            padding: 24px;
            align-items: center;
            gap: 32px;
        }

        .album-art {
            position: relative;
            flex-shrink: 0;
            width: 180px;
            height: 180px;
            border-radius: 0.5rem;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .album-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .album-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.4), transparent);
        }

        .track-controls-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 24px;
            height: 100%;
        }

        .metadata {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .track-title {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.025em;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .artist-name {
            margin: 0;
            color: var(--on-surface-variant);
            font-size: 1rem;
            font-weight: 500;
        }

        .controls-row {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .control-btn {
            background: none;
            border: none;
            color: var(--on-surface);
            cursor: pointer;
            transition: color 0.2s;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            color: var(--primary);
        }

        .play-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-container));
            color: var(--on-primary-container);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .play-btn:hover {
            transform: scale(1.05);
        }

        .play-btn:active {
            transform: scale(0.95);
        }

        .secondary-controls {
            margin-left: auto;
            display: flex;
            gap: 16px;
        }

        .secondary-btn {
            background: none;
            border: none;
            color: var(--on-surface-variant);
            cursor: pointer;
            transition: color 0.2s;
            padding: 0;
        }

        .secondary-btn:hover {
            color: var(--primary);
        }

        .secondary-btn.fav:hover {
            color: #5af0b4;
        }

        .progress-section {
            width: 100%;
            padding: 0 24px 24px 24px;
            box-sizing: border-box;
        }

        .progress-bar-bg {
            position: relative;
            width: 100%;
            height: 6px;
            background-color: var(--surface-variant);
            border-radius: 999px;
            cursor: pointer;
            overflow: hidden;
        }

        .progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 42%;
            background: linear-gradient(to right, var(--primary), var(--primary-dim));
            border-radius: 999px;
            transition: width 0.3s ease;
        }

        .time-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
        }

        .time-labels span {
            font-size: 10px;
            font-weight: 700;
            color: var(--on-surface-variant);
            letter-spacing: 0.05em;
        }

        /* Queue Drawer */
        .queue-drawer {
            position: absolute;
            top: 0;
            bottom: 0;
            right: 0;
            width: 240px;
            background: rgba(10, 10, 15, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            z-index: 20;
        }

        .queue-header {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .queue-header h3 {
            margin: 0;
            color: var(--primary);
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        .close-queue-btn {
            background: none;
            border: none;
            color: var(--on-surface-variant);
            cursor: pointer;
            padding: 0;
        }

        .queue-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .queue-list::-webkit-scrollbar {
            width: 3px;
        }

        .queue-list::-webkit-scrollbar-thumb {
            background: rgba(183, 159, 255, 0.2);
            border-radius: 10px;
        }

        .queue-item {
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .queue-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .queue-item.active {
            background: rgba(183, 159, 255, 0.1);
            border-left: 2px solid var(--primary);
            position: relative;
        }

        .queue-item.active::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(183, 159, 255, 0.05);
            filter: blur(8px);
            z-index: -1;
        }

        .queue-thumb {
            width: 40px;
            height: 40px;
            border-radius: 2px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .queue-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .queue-item-info {
            flex: 1;
            min-width: 0;
        }

        .queue-track-name {
            margin: 0;
            font-size: 14px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .queue-artist-name {
            margin: 0;
            font-size: 10px;
            font-weight: 500;
            color: var(--on-surface-variant);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .active .queue-artist-name {
            color: var(--primary);
        }

        .active-indicator {
            width: 6px;
            height: 6px;
            background-color: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--primary);
        }

        .queue-footer {
            padding: 16px;
            background: rgba(10, 10, 15, 0.4);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .brand-logo-small {
            width: 20px;
            height: 20px;
            border-radius: 2px;
        }

        .brand-text-small {
            font-size: 10px;
            font-weight: 900;
            color: rgba(222, 229, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .fill-icon {
            font-variation-settings: 'FILL' 1;
        }
    </style>
</head>
