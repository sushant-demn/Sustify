<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="stylesheet" href="index.css">
    <script src="index.js" defer></script>
</head>

<body>

    <div class="top-bar">
        <!-- <h3 class="appname">this is a music player</h3> -->
        <div class="search-icon" onclick="getPath()">🔍</div>
    </div>

    <div class="main-content">
        <div class="album-art"><img class="album-image"
                src="https://upload.wikimedia.org/wikipedia/en/7/70/Graduation_%28album%29.jpg" alt="album-cover"></div>

        <div class="player-controls">
            <div class="song-title">Title</div>
            <div class="buttons">
                <span>⏮</span>
                <span onclick="playPause()">⏸</span>
                <span>⏭</span>
            </div>
        </div>

        <input type="range" class="volume-slider" min="0" max="100">
        <span id="volume-value">50%</span>

    </div>

    <div class="progress-container">
        <div class="progress-bar">
            <div class="progress-fill"></div>
            <div class="time-stamp">0:00</div>
        </div>
    </div>

</body>

</html>
